name: Release embedded example

on:
  push:
    tags:
      - "embedded-v*"
  workflow_dispatch:
    inputs:
      models_release:
        description: "Release tag that contains the model and voice assets"
        required: false
        default: "models-v1"

permissions:
  contents: write

env:
  RENIKUD_URL: https://huggingface.co/thewh1teagle/renikud/resolve/main/model.onnx

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            exe: embedded
            out_ext: ""
            archive: tar.gz
          - name: linux-arm64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            exe: embedded
            out_ext: ""
            archive: tar.gz
          - name: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
            exe: embedded
            out_ext: ""
            archive: tar.gz
          - name: windows-x64
            os: windows-2022
            target: x86_64-pc-windows-msvc
            exe: embedded.exe
            out_ext: ".exe"
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang libasound2-dev libclang-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Download embedded assets
        shell: bash
        run: |
          models_release="${{ inputs.models_release || 'models-v1' }}"
          base="https://github.com/thewh1teagle/blue-rs/releases/download/${models_release}"
          curl -L "$base/blue-rs-onnx-models-int8.tar.gz" -o blue-rs-onnx-models-int8.tar.gz
          tar -xzf blue-rs-onnx-models-int8.tar.gz
          curl -L "$base/blue-rs-voices.tar.gz" -o blue-rs-voices.tar.gz
          tar -xzf blue-rs-voices.tar.gz
          curl -L "$RENIKUD_URL" -o renikud.onnx

      - name: Build embedded example
        shell: bash
        run: |
          export SDKROOT="$(xcrun --show-sdk-path 2>/dev/null || true)"
          cargo build --release --example embedded --target "${{ matrix.target }}"

      - name: Smoke test
        shell: bash
        run: |
          bin="target/${{ matrix.target }}/release/examples/${{ matrix.exe }}"
          "$bin" --language en "Hello world." smoke.wav
          test -s smoke.wav

      - name: Package
        shell: bash
        run: |
          mkdir -p package
          bin="target/${{ matrix.target }}/release/examples/${{ matrix.exe }}"
          cp "$bin" "package/blue-rs-embedded-${{ matrix.name }}${{ matrix.out_ext }}"
          if [ "${{ matrix.archive }}" = "zip" ]; then
            7z a "blue-rs-embedded-${{ matrix.name }}.zip" ./package/*
          else
            tar -czf "blue-rs-embedded-${{ matrix.name }}.tar.gz" -C package .
          fi

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: blue-rs-embedded-${{ matrix.name }}.${{ matrix.archive }}

      - name: Upload workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: blue-rs-embedded-${{ matrix.name }}
          path: blue-rs-embedded-${{ matrix.name }}.${{ matrix.archive }}
